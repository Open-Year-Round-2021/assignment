<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>instagram</title>
    <link rel="shortcut icon" href="img/instagram_logo.png">
    <link rel="stylesheet" href="mypage.css">
    <script src="mypage.js"></script>
</head>

<body>
    <div class="Top">
        <div class= "Top_left">
            <a href= "feed.html"><img class= "home" src="img/instagram_logoName.png"></a>
        </div>

        <div id= "input" style="width: 300px; height:28px; background-color:#FAFAFA;">
            <input id ="input_control" class = "input_box" type="text" style="width:300px; height:28px; background-color:#FAFAFA; text-align:center;"><div id="search">검색</div>
        </div>
        
        <div class= "Top_right">
            <a href= "mypage.html"><img class = "Top_rightImg" src="img/instagram_feedProfile.jpg" style= "border-radius : 70%;"></a>
            <a href= "https://www.instagram.com"><img class= "Top_rightImg" src="img/instagram_safari.png" ></a>
            <a href= "https://www.instagram.com"><img class= "Top_rightImg" src="img/instagram_likes1.png"></a>
            <a href= "https://www.instagram.com"><img class= "Top_rightImg" src="img/instagram_user.png"></a>
        </div>
    </div>
    

    <div class= "Out">
        <div class= "Out_box">

            <div class= "user_profile">
                <img class= "user" src= "img/instagram_feedProfile.jpg">
                <div class= "user_detail">USER</div>
            </div>

            <div class= "user_select">
                <!-- <div class= "select">게시물<div> -->
                <!-- <div class= "select">IGTV</div> -->
                <!-- <div class= "select">태그됨</div> -->
            </div>

            <div class= "user_photo">
                <img class= "user_img" src= "img/mypage_img1.jpg" onmouseover="">
                <img class= "user_img" src= "img/mypage_img2.jpg">
                <img class= "user_img" src= "img/mypage_img3.jpg">
                <img class= "user_img" src= "img/mypage_img4.jpg">
                <img class= "user_img" src= "img/mypage_img5.jpg">
            </div>

        </div>
    </div>





    
    <script>

        // 검색창 기능
        document.getElementById('input_control').addEventListener('focus',function(){
            
            if (document.getElementById('input_control').value == ''){
                document.getElementById('search').style.display = 'block';
                document.getElementById('search').style.marginLeft = '15px';
            }
        
            else{
                document.getElementById('search').style.display = 'none';
            }
        })
        
        document.getElementById('input_control').addEventListener('blur',function(){
        
            if (document.getElementById('input_control').value == ''){
                document.getElementById('search').style.display = 'block';
                document.getElementById('search').style.marginLeft = "140px";
            }
        
            else{
                document.getElementById('search').style.display = 'none';
            }
        })
        
        document.getElementById('input_control').addEventListener('keydown',function(){
            document.getElementById('search').style.display = 'none';
        })
        
    </script>
</body>
</html>
